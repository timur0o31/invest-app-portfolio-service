openapi: 3.0.3

info:
  title: Portfolio Service
  version: 1.0.0

paths:

  /accounts:
    get:
      tags:
        - Accounts
      summary: Get or create user account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /accounts/deposit:
    post:
      tags:
        - Accounts
      summary: Deposit money to account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositRequest'
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/withdraw:
    post:
      tags:
        - Accounts
      summary: Withdraw money from account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

        userId:
          type: string
          format: uuid

        balance:
          type: string

        currency:
          type: string

    DepositRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string

    WithdrawRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string